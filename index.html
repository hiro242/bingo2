<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>文字ビンゴ（FREEなし）</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f5f5f5;
}
h1 {
  margin-top: 20px;
}
table {
  margin: 20px auto;
  border-collapse: collapse;
}
td {
  width: 120px;
  height: 80px;
  border: 2px solid #333;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  background: white;
  user-select: none;
  padding: 5px;
}
td.checked {
  background: #4caf50;
  color: #fff;
}
button {
  padding: 10px 16px;
  font-size: 16px;
  margin: 5px;
}
</style>
</head>

<body>

<h1>歩活ビンゴ</h1>

<table id="bingo"></table>

<button onclick="clearCheck()">チェック解除</button>
<button onclick="shuffleBingo()">シャッフル</button>

<script>
const size = 5;
const table = document.getElementById("bingo");
const STORAGE_KEY = "bingo_text_no_free_v2";

/* ===== 25個の文字 ===== */
const words = [
  "1.平均歩数を相手チームより上回れ！",
  "2.階段1000段",
  "3.春の食べれる野草見つける（既出禁止）",
  "4.相手より歴史ある建造物を撮影！（年数勝負、再建は許す）",
  "5.ウォーキングorランニング10km",
  "6.昼休み休憩３０分歩く",
  "7.朝日が昇る前に5000歩達成",
  "8.同僚と歩く",
  "9.日本で初めての〇〇をみつける。",
  "10.相手チームより名前が長い昆虫を見つけろ！",
  "11.雨の日に12,000歩",
  "12.サイレンが鳴っている消防車を撮影！",
  "13.１日30,000歩を達成",
  "14.ホタルをみつけよ！",
  "15.街なかの危険箇所発見し、官公庁へ報告する",
  "16.足の生えたオタマジャクシをみつけよ！",
  "17.相手チームより名前が長い川の名前を見つけろ！",
  "18.ガソリンスタンドで３人の定員が立っている状態で撮影",
  "19.２日平均20,000歩",
  "20.相手チームより国名が長い国旗を見つけよ！（一般的な言い方の国名のみ）",
  "21.出勤前及び帰宅後１時間の散歩",
  "22.相手チームより名前が長い公園を見つけよ！",
  "23.２人組の路上ライブを撮影",
  "24.当社の踏切で漢字４文字以上の踏切をみつける",
  "25.最寄り駅から２駅手前から帰宅"
];
/* ====================== */

// 保存データ読込み
const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));

// シャッフル
const shuffled = [...words].sort(() => Math.random() - 0.5);

let cells = [];
let index = 0;

// ビンゴ表作成
for (let r = 0; r < size; r++) {
  const tr = document.createElement("tr");
  for (let c = 0; c < size; c++) {
    const td = document.createElement("td");
    const cellIndex = r * size + c;

    td.textContent = saved?.words?.[cellIndex] ?? shuffled[index++];

    td.onclick = () => {
      td.classList.toggle("checked");
      save();
    };

    if (saved?.checked?.[cellIndex]) {
      td.classList.add("checked");
    }

    cells.push(td);
    tr.appendChild(td);
  }
  table.appendChild(tr);
}

// 保存処理
function save() {
  const data = {
    words: cells.map(td => td.textContent),
    checked: cells.map(td => td.classList.contains("checked"))
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ✅ チェックだけ解除（文字はそのまま）
function clearCheck() {
  cells.forEach(td => td.classList.remove("checked"));
  save();
}

// ✅ シャッフル（文字を入れ替え）
function shuffleBingo() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
</script>

</body>
</html>
